name: Mirror to client repo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate deploy key
        env:
          DEPLOY_KEY: ${{ secrets.CLIENT_REPO_DEPLOY_KEY }}
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "::error::CLIENT_REPO_DEPLOY_KEY secret is missing. See README → Mirror setup."
            exit 1
          fi

      - name: Push to client repository
        env:
          DEPLOY_KEY: ${{ secrets.CLIENT_REPO_DEPLOY_KEY }}
        run: |
          git config --global user.name "mirror-bot"
          git config --global user.email "mirror-bot@users.noreply.github.com"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
          git push git@github.com:vitalcareresearch/website.git main:main --force
