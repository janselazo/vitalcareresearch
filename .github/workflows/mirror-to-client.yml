name: Mirror to client repo

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to client repository
        run: |
          git remote add client https://x-access-token:${{ secrets.CLIENT_REPO_TOKEN }}@github.com/vitalcareresearch-glitch/website.git
          git push client main --force-with-lease
