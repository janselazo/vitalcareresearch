name: Mirror to client repo

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to client repository
        env:
          CLIENT_TOKEN: ${{ secrets.CLIENT_REPO_TOKEN }}
        run: |
          git config --global user.name "mirror-bot"
          git config --global user.email "mirror-bot@users.noreply.github.com"
          git push "https://x-access-token:${CLIENT_TOKEN}@github.com/vitalcareresearch-glitch/website.git" main:main --force
